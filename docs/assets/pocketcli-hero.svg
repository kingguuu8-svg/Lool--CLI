  <text x="88" y="341" fill="#d5def0" font-family="Consolas, monospace" font-size="22">Launching remote session...</text>
  <text x="88" y="378" fill="#d5def0" font-family="Consolas, monospace" font-size="22">Ready.</text>
  <rect x="620" y="152" width="436" height="48" rx="12" fill="#132241"/>
  <text x="648" y="184" fill="#f5f7fb" font-family="Segoe UI, Arial" font-size="24">Desktop launcher</text>
  <rect x="620" y="224" width="188" height="60" rx="14" fill="#1d4ed8"/>
  <rect x="832" y="224" width="188" height="60" rx="14" fill="#0f766e"/>
