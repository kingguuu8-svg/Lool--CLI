  <text x="648" y="344" fill="#9fb5d9" font-family="Consolas, monospace" font-size="20">URL=http://your-vps-host</text>
  <text x="648" y="382" fill="#9fb5d9" font-family="Consolas, monospace" font-size="20">ACCESS_TOKEN=...</text>
  <text x="648" y="430" fill="#d5def0" font-family="Segoe UI, Arial" font-size="22">Windows launcher + browser terminal + Android shell</text>
  <text x="88" y="566" fill="#6f86ad" font-family="Segoe UI, Arial" font-size="20">Claude Code supported today. More local agent CLIs planned.</text>
