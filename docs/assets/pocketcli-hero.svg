  <text x="88" y="78" fill="#9fb5d9" font-family="Consolas, monospace" font-size="24">PocketCLI</text>
  <text x="88" y="158" fill="#f5f7fb" font-family="Segoe UI, Arial" font-size="44" font-weight="700">Self-hosted access for local agent CLIs</text>
  <text x="88" y="205" fill="#98a9c5" font-family="Segoe UI, Arial" font-size="24">Run on your own machine. Reach it from desktop, browser, and Android.</text>
